<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>E-commerce Tecnológico</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>🛒 E-commerce Tecnológico</h1>

<div class="buttons-top">
<button class="btn btn-primary" onclick="abrirModalProducto()">
Agregar Producto
</button>

<button class="btn btn-primary" onclick="abrirModalUsuario()">
Agregar Usuario
</button>
</div>

<h2>Productos</h2>
<div id="itemList" class="grid"></div>

<h2>Usuarios</h2>
<div id="userList" class="grid"></div>

<h2>Pedidos</h2>
<div id="pedidoList" class="grid"></div>

<h2>Estadísticas</h2>

<div class="stats">
<p>Total productos: <span id="statTotal">0</span></p>
<p>Disponibles: <span id="statDisponible">0</span></p>
<p>No disponibles: <span id="statNo">0</span></p>
<p>Usuarios: <span id="statUsuarios">0</span></p>
</div>


<!-- MODAL PRODUCTO -->
<div id="modalProducto" class="modal">
<div class="modal-content">

<h3>Agregar Producto</h3>

<form id="formProducto">

<input id="productoNombre" placeholder="Nombre" required>
<input id="productoPrecio" type="number" placeholder="Precio" required>

<div class="modal-buttons">
<button class="btn btn-success">Guardar</button>
<button type="button" class="btn btn-secondary" onclick="cerrarModalProducto()">Cancelar</button>
</div>

</form>
</div>
</div>


<!-- MODAL USUARIO -->
<div id="modalUsuario" class="modal">
<div class="modal-content">

<h3>Agregar Usuario</h3>

<form id="formUsuario">

<input id="usuarioNombre" placeholder="Nombre" required>
<input id="usuarioEmail" placeholder="Email" required>

<select id="usuarioRol">
<option>Cliente</option>
<option>Admin</option>
</select>

<div class="modal-buttons">
<button class="btn btn-success">Guardar</button>
<button type="button" class="btn btn-secondary" onclick="cerrarModalUsuario()">Cancelar</button>
</div>

</form>
</div>
</div>

<script src="starter/script.js"></script>
<script src="starter/producto.js"></script>
<script src="starter/usuarios.js"></script>
<script src="starter/pedidos.js"></script>
<script src="starter/estadisticas.js"></script>

</body>
</html>
