<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TechZone Store</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>TechZone Store</h1>

<button id="themeToggle">🌙 Cambiar tema</button>
<!-- BOTONES -->
<div class="top-buttons">
<button onclick="abrirModalProducto()">Agregar Producto</button>
<button onclick="abrirModalUsuario()">Agregar Usuario</button>
</div>

<!-- ESTADISTICAS -->
<section class="stats">
<h2>Estadísticas</h2>

<div>Total productos: <span id="statTotal">0</span></div>
<div>Disponibles: <span id="statDisponible">0</span></div>
<div>No disponibles: <span id="statNo">0</span></div>
<div>Usuarios: <span id="statUsuarios">0</span></div>

</section>

<!-- PRODUCTOS -->
<section>
<h2>Productos</h2>
<div id="itemList" class="grid"></div>
</section>

<!-- USUARIOS -->
<section>
<h2>Usuarios</h2>
<div id="userList" class="grid"></div>
</section>

<!-- PEDIDOS -->
<section>
<h2>Pedidos</h2>
<div id="pedidoList" class="grid"></div>
</section>


<!-- MODAL PRODUCTO -->
<div id="modalProducto" class="modal">

<form id="formProducto" class="modal-content">

<h2>Agregar Producto</h2>

<input id="productoNombre" placeholder="Nombre" required>
<input id="productoPrecio" placeholder="Precio" required>

<button type="submit">Guardar</button>
<button type="button" onclick="cerrarModalProducto()">Cerrar</button>

</form>
</div>


<!-- MODAL USUARIO -->
<div id="modalUsuario" class="modal">

<form id="formUsuario" class="modal-content">

<h2>Agregar Usuario</h2>

<input id="usuarioNombre" placeholder="Nombre" required>
<input id="usuarioEmail" placeholder="Email" required>

<select id="usuarioRol">
<option>Cliente</option>
<option>Admin</option>
</select>

<button type="submit">Guardar</button>
<button type="button" onclick="cerrarModalUsuario()">Cerrar</button>

</form>
</div>


<!-- SCRIPTS -->
<script src="starter/mainsystem.js"></script>
<script src="starter/producto.js"></script>
<script src="starter/usuarios.js"></script>
<script src="starter/pedidos.js"></script>
<script src="starter/estadisticas.js"></script>
<script src="starter/script.js"></script>

</body>
</html>
