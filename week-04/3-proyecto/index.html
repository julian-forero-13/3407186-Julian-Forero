<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TechZone - E-commerce</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <h1>🛒 TechZone - Tienda Tecnológica</h1>
    <p>Sistema de gestión de productos tecnológicos</p>
  </header>


  <main class="main">

    <!-- =========================
         FORMULARIO PRODUCTOS
    ========================== -->
    <section class="card">

      <h2>➕ Agregar Producto</h2>

      <form id="product-form">

        <div class="form-row">

          <div class="form-group">
            <label>Nombre</label>
            <input
              type="text"
              name="name"
              required
              placeholder="Ej: Laptop Lenovo"
            />
          </div>

          <div class="form-group">
            <label>Tipo</label>

            <!-- IMPORTANTE: category-select -->
            <select
              name="category"
              id="category"
              class="category-select"
              required
            >
              <option value="">Seleccionar...</option>
            </select>
          </div>

        </div>


        <div class="form-row">

          <div class="form-group">
            <label>Precio</label>
            <input
              type="number"
              name="price"
              min="0"
              step="0.01"
              required
            />
          </div>

          <div class="form-group">
            <label>Stock</label>
            <input
              type="number"
              name="quantity"
              min="0"
              required
            />
          </div>

        </div>


        <div class="form-actions">
          <button class="btn btn-primary">
            Guardar Producto
          </button>

          <button type="reset" class="btn btn-secondary">
            Limpiar
          </button>
        </div>

      </form>

    </section>



    <!-- =========================
         FILTROS
    ========================== -->
    <section class="card">

      <h2>🔎 Buscar</h2>

      <div class="filters">

        <input
          type="text"
          id="search"
          placeholder="Buscar producto..."
        />

        <!-- IMPORTANTE -->
        <select id="filter-category" class="category-select">
          <option value="">Todas las categorías</option>
        </select>

        <select id="filter-stock">
          <option value="">Todo</option>
          <option value="low">Stock bajo</option>
          <option value="out">Sin stock</option>
          <option value="available">Disponible</option>
        </select>

      </div>

    </section>



    <!-- =========================
         TABLA PRODUCTOS
    ========================== -->
    <section class="card">

      <div class="card-header">
        <h2>📦 Productos</h2>
        <span id="product-count" class="badge">0 productos</span>
      </div>

      <table>

        <thead>
          <tr>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Total</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <!-- IMPORTANTE -->
        <tbody id="products-body">

          <tr>
            <td colspan="6" class="empty-state">
              No hay productos
            </td>
          </tr>

        </tbody>

      </table>

    </section>



    <!-- =========================
         REPORTES
    ========================== -->
    <section class="card">

      <div class="card-header">
        <h2>📊 Reportes</h2>

        <button
          id="load-reports"
          class="btn btn-secondary"
        >
          Cargar Reportes
        </button>

      </div>

      <div id="reports-container">
        Cargar estadísticas del sistema
      </div>

    </section>

  </main>



  <!-- FOOTER -->
  <footer class="footer">
    Proyecto JavaScript Modular - TechZone
  </footer>


</div>



<!-- =========================
     MODAL EDITAR
========================== -->
<div id="edit-modal" class="modal hidden">

  <div class="modal-content">

    <h3>Editar producto</h3>

    <form id="edit-form">

      <input type="hidden" id="edit-id" />

      <input type="text" id="edit-name" required />

      <!-- IMPORTANTE -->
      <select id="edit-category" class="category-select"></select>

      <input type="number" id="edit-price" min="0" required />
      <input type="number" id="edit-quantity" min="0" required />

      <button>Guardar</button>

    </form>

  </div>

</div>



<!-- =========================
     MAIN MODULE
========================== -->

<!-- Si main.js está dentro de carpeta starter -->
<script type="module" src="starter/main.js"></script>

</body>
</html>
