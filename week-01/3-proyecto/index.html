<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  <title>TechZone Store - E-commerce</title>

  <title>TechZone</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">

    <!-- Botón de cambio de tema -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema">
      🌙
    </button>

    <!-- Tarjeta principal -->
    <div class="card">

      <!-- Header -->
      <div class="card-header">
        <h1 id="entity-name">TechZone</h1>
        <p id="entity-description">Venta de productos tecnologicos</p>
      </div>

      <!-- Contacto -->
      <div class="card-section">
        <h2>Información de Contacto</h2>
        <div id="entity-contact">
          techzone@gmail.com
        </div>
        <button id="copy-btn" class="btn">Copiar información</button>
      </div>

      <!-- Productos -->
      <div class="card-section">
        <h2>Productos Destacados</h2>
        <div id="items-list">
          Cargando productos...
        </div>
        <button id="toggle-items" class="btn btn-secondary">
          Mostrar más productos
        </button>
      </div>

      <!-- Redes Sociales -->
      <div class="card-section">
        <h2>Redes Sociales</h2>
        <div id="links" class="social-links">
          Cargando enlaces...
        </div>
      </div>

      <!-- Estadísticas -->
      <div class="card-section">
        <h2>Estadísticas</h2>
        <div id="stats" class="stats-grid">
          Cargando estadísticas...
        </div>
      </div>

    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>🛒 TechZone Store - E-commerce Tecnológico</p>
      <p class="small">Proyecto Semana 01 - JavaScript ES2023</p>
    </footer>

  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">
    <span id="toast-message"></span>
  </div>

  <!-- Script -->
  <script src="starter/script.js"></script>

</body>
</html>
